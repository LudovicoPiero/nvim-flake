name: Nix Flake Checker

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  flake-checker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@latest
      - name: Run `nix flake check`
        run: nix flake check
